name: Release Plugin

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
    - "Jellyfin.Plugin.JellyfinHelper/**"
    - "Directory.Build.props"

permissions:
  contents: write

env:
  PLUGIN_NAME: JellyfinHelper
  TARGET_ABI: "10.11.0.0"

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip release]')"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x

    - name: Read version from manifest
      run: |
        VERSION=$(jq -r '.[0].versions[0].version' manifest.json)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Check if tag already exists (remote)
      run: |
        if git ls-remote --tags origin | grep -q "refs/tags/$VERSION$"; then
          echo "TAG_EXISTS=true" >> $GITHUB_ENV
          echo "::warning::Tag $VERSION already exists — skipping entire release."
        else
          echo "TAG_EXISTS=false" >> $GITHUB_ENV
        fi

    - name: Restore
      if: env.TAG_EXISTS == 'false'
      run: dotnet restore

    - name: Run tests
      if: env.TAG_EXISTS == 'false'
      run: dotnet test --configuration Release --no-restore --verbosity normal

    - name: Publish plugin
      if: env.TAG_EXISTS == 'false'
      run: |
        dotnet publish Jellyfin.Plugin.JellyfinHelper/Jellyfin.Plugin.JellyfinHelper.csproj \
          -c Release \
          -o ./publish \
          -p:Version=${VERSION} \
          -p:AssemblyVersion=${VERSION}.0 \
          -p:FileVersion=${VERSION}.0 \
          -p:InformationalVersion=${VERSION}

    - name: Create release package
      if: env.TAG_EXISTS == 'false'
      run: |
        mkdir package
        cp publish/*.dll package/
        cd package
        zip ../${PLUGIN_NAME}_${VERSION}.zip *

    - name: Generate checksums
      if: env.TAG_EXISTS == 'false'
      run: |
        md5sum ${PLUGIN_NAME}_${VERSION}.zip | cut -d ' ' -f1 > checksum_md5.txt
        sha256sum ${PLUGIN_NAME}_${VERSION}.zip | cut -d ' ' -f1 > checksum_sha256.txt
        echo "CHECKSUM=$(cat checksum_md5.txt)" >> $GITHUB_ENV
        echo "CHECKSUM_SHA256=$(cat checksum_sha256.txt)" >> $GITHUB_ENV

    - name: Read changelog from manifest
      if: env.TAG_EXISTS == 'false'
      run: |
        CHANGELOG=$(jq -r '.[0].versions[0].changelog' manifest.json)
        echo "CHANGELOG<<EOF" >> $GITHUB_ENV
        echo "$CHANGELOG" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Create tag
      if: env.TAG_EXISTS == 'false'
      run: |
        git tag $VERSION
        git push origin $VERSION

    - name: Create GitHub Release
      if: env.TAG_EXISTS == 'false'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.VERSION }}
        name: v${{ env.VERSION }}
        body: |
          ## Changelog
          ${{ env.CHANGELOG }}

          ## Checksums
          - **MD5:** `${{ env.CHECKSUM }}`
          - **SHA256:** `${{ env.CHECKSUM_SHA256 }}`

          ## Installation
          Download `${{ env.PLUGIN_NAME }}_${{ env.VERSION }}.zip` and extract it into your Jellyfin plugins directory.
        files: |
          ${{ env.PLUGIN_NAME }}_${{ env.VERSION }}.zip
          checksum_sha256.txt

    - name: Update metadata and push directly to main
      if: env.TAG_EXISTS == 'false'
      run: |
        DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/${PLUGIN_NAME}_${VERSION}.zip"

        jq --arg checksum "$CHECKSUM" \
           --arg sha256 "$CHECKSUM_SHA256" \
           --arg url "$DOWNLOAD_URL" \
           '
           .[0].versions[0].checksum = $checksum |
           .[0].versions[0].timestamp = (now | todateiso8601) |
           .[0].versions[0].sourceUrl = $url
           ' manifest.json > manifest.tmp
        mv manifest.tmp manifest.json

        sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        sudo chmod +x /usr/bin/yq

        yq eval -i '
          .version = strenv(VERSION) |
          .targetAbi = strenv(TARGET_ABI) |
          .framework = "net9.0" |
          .changelog = strenv(CHANGELOG)
        ' build.yaml

        echo "$CHECKSUM" > checksum_md5.txt
        echo "$CHECKSUM_SHA256" > checksum_sha256.txt

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add manifest.json build.yaml checksum_md5.txt checksum_sha256.txt
        git commit -m "chore: update release metadata for ${VERSION} [skip release]"
        git push origin main