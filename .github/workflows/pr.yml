name: PR Build & Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PLUGIN_NAME: JellyfinHelper

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --configuration Release --no-restore --verbosity normal

    - name: Publish plugin
      run: |
        dotnet publish Jellyfin.Plugin.JellyfinHelper/Jellyfin.Plugin.JellyfinHelper.csproj \
          -c Release \
          -o ./publish \
          --no-build

    - name: Create test package
      run: |
        mkdir package
        cp publish/*.dll package/
        cp publish/*.pdb package/ 2>/dev/null || true
        cd package
        zip ../${PLUGIN_NAME}_test-build.zip *

    - name: Upload build artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.PLUGIN_NAME }}_test-build
        path: ${{ env.PLUGIN_NAME }}_test-build.zip
        retention-days: 14

  # Deploy a live preview of the dashboard demo for this PR
  demo-preview:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare demo site
        run: |
          mkdir -p docs/css docs/js docs/i18n

          cp Jellyfin.Plugin.JellyfinHelper/PluginPages/css/*.css docs/css/
          cp Jellyfin.Plugin.JellyfinHelper/PluginPages/js/*.js   docs/js/
          cp Jellyfin.Plugin.JellyfinHelper/i18n/en.json          docs/i18n/
          touch docs/.nojekyll

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./docs
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
